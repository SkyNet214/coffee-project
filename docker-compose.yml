services:
  db:
    image: mysql:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db:/docker-entrypoint-initdb.d

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data: